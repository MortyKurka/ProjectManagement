name: CI

on: 
  push:
    branches: 
      - 'feature/**'
  pull_request:
    branches: [main]
    
jobs:

  build:
    name: Build on ${{ matrix.os }} .NET ${{ matrix.dotnet-version }} (${{ matrix.configuration }})
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        dotnet-version: ['8.0.x', '10.0.x']
        configuration: [Debug]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup .NET(${{ matrix.dotnet-version }})
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Restore dependencies
        run: dotnet restore
          
      - name: Build
        run: dotnet build --no-restore --configuration ${{ matrix.configuration }}
        
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Build-${{ matrix.os }}-${{ matrix.dotnet-version }}-${{ matrix.configuration }}
          path: src/**/bin/${{ matrix.configuration }}/**/*
      
  unit-test:
    name: Unit-tests on ${{ matrix.os }} .NET ${{ matrix.dotnet-version }} (${{ matrix.configuration }})
    needs: [build]
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        dotnet-version: ['8.0.x', '10.0.x']
        configuration: [Debug]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup .NET(${{ matrix.dotnet-version }})
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: Build-${{ matrix.os }}-${{ matrix.dotnet-version }}-${{ matrix.configuration }}
          path: src/**/bin/${{ matrix.configuration }}/**/*

      - name: Unit test
        run: dotnet test --no-build --configuration ${{ matrix.configuration }} --logger trx
        
      - name: Upload test result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults-${{ matrix.os }}-${{ matrix.dotnet-version }}-${{ matrix.configuration }}
          path: TestResults/
